DoencaRequest:
  type: object
  required:
    - nome
    - especieId
  properties:
    nome:
      type: string
      example: "Psitacose (Clamidiose)"
    nomeCientifico:
      type: string
      example: "Chlamydia psittaci"
    sintomas:
      type: string
      example: "Apatia, penas arrepiadas, diarreia verde..."
    especieId:
      type: string
      format: uuid
      description: "ID da Espécie afetada"

DoencaResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    nome:
      type: string
    nomeCientifico:
      type: string
    sintomas:
      type: string
    especieId:
      type: string
      format: uuid
    criadoEm:
      type: string
      format: date-time

DosagemItemRequest:
  type: object
  properties:
    medicamentoId:
      type: string
      format: uuid
    doseMinima:
      type: number
      format: double
      example: 10.0
    doseMaxima:
      type: number
      format: double
      example: 20.0
    unidade:
      type: string
      example: "mg/kg"
    frequencia:
      type: string
      example: "BID (12/12h)"
    duracao:
      type: string
      example: "7 dias"
    via:
      type: string
      example: "Oral"

ProtocoloRequest:
  type: object
  required: [ doencaId, referenciaId, titulo, dosagens ]
  properties:
    doencaId:
      type: string
      format: uuid
    referenciaId:
      type: string
      format: uuid
    titulo:
      type: string
      example: "Tratamento Padrão - Carpenter 2018"
    observacoes:
      type: string
    dosagens:
      type: array
      items:
        $ref: '#/DosagemItemRequest'

# --- RESPONSES ---
DosagemResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    medicamentoId:
      type: string
      format: uuid
    dose:
      type: string
      description: "Texto formatado (ex: 10-20 mg/kg)"
    detalhes:
      type: string
      description: "Via, frequência e duração"

ProtocoloResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    titulo:
      type: string
    referenciaId:
      type: string
      format: uuid
    observacoes:
      type: string
    dosagens:
      type: array
      items:
        $ref: '#/DosagemResponse'

# [MELHORIA] Objeto auxiliar para não gerar classe interna anônima no Java
ProtocoloDetalhadoResponse:
  type: object
  properties:
    titulo: { type: string }
    referencia: { type: string }
    observacoes: { type: string }
    dosagens:
      type: array
      items: { $ref: '#/DosagemResponse' }
    alertasGerais:
      type: array
      items: { type: string }

ProtocoloCompletoResponse:
  type: object
  properties:
    doenca: { $ref: '#/DoencaResponse' }
    protocolos:
      type: array
      items:
        $ref: '#/ProtocoloDetalhadoResponse'


CalculoSeguroRequest:
  type: object
  required: [protocoloId, medicamentoId, peso, unidadePeso]
  properties:
    protocoloId:
      type: string
      format: uuid
      description: "Obrigatório: O cálculo deve vir de um protocolo existente."
    medicamentoId:
      type: string
      format: uuid
      description: "O medicamento dentro do protocolo."
    peso:
      type: number
      format: double
      example: 0.450
    unidadePeso:
      type: string
      enum: [KG, G]
      example: "KG"

CalculoResponse:
  type: object
  properties:
    protocoloTitulo: { type: string }
    medicamentoNome: { type: string }
    referenciaBibliografica: { type: string }
    pesoConsideradoKg: { type: number, format: double }

    # Resultados em MG (Massa)
    doseMinimaMg: { type: number, format: double }
    doseMaximaMg: { type: number, format: double }

    # Resultados em ML (Volume - Se houver concentração)
    volumeMinimoMl: { type: number, format: double }
    volumeMaximoMl: { type: number, format: double }

    # Instruções
    concentracaoUtilizada: { type: string }
    frequencia: { type: string }
    via: { type: string }
    duracao: { type: string }

    # Segurança
    alertas:
      type: array
      items: { type: string }

# --- WRAPPERS ---
ApiResponseProtocolo:
  type: object
  properties:
    sucesso: { type: boolean }
    mensagem:
      type: string
    dados: { $ref: '#/ProtocoloResponse' }

ApiResponseListaProtocolo:
  type: object
  properties:
    sucesso: { type: boolean }
    dados:
      type: array
      items: { $ref: '#/ProtocoloResponse' }

ApiResponseProtocoloCompleto:
  type: object
  properties:
    sucesso: { type: boolean }
    dados: { $ref: '#/ProtocoloCompletoResponse' }

ApiResponseDoenca:
  type: object
  properties:
    sucesso:
      type: boolean
    mensagem:
      type: string
    dados:
      $ref: '#/DoencaResponse'

ApiResponseListaDoenca:
  type: object
  properties:
    sucesso:
      type: boolean
    dados:
      type: array
      items:
        $ref: '#/DoencaResponse'

ApiResponseCalculo:
  type: object
  properties:
    sucesso: { type: boolean }
    dados: { $ref: '#/CalculoResponse' }
