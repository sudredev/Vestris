paths:
  /api/v1/doencas:
    post:
      tags:
        - Doencas
      summary: Cadastrar nova doença
      operationId: criarDoenca
      requestBody:
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/DoencaRequest'
      responses:
        '200':
          description: Sucesso
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yml#/ApiResponseDoenca'

    get:
      tags:
        - Doencas
      summary: Listar todas as doenças
      operationId: listarDoencas
      responses:
        '200':
          description: Lista recuperada
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yml#/ApiResponseListaDoenca'

  /api/v1/doencas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Doencas
      summary: Buscar doença por ID
      operationId: buscarDoencaPorId
      responses:
        '200':
          description: Encontrado
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yml#/ApiResponseDoenca'
    put:
      tags:
        - Doencas
      summary: Atualizar doença
      operationId: atualizarDoenca
      requestBody:
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/DoencaRequest'
      responses:
        '200':
          description: Atualizado
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yml#/ApiResponseDoenca'
    delete:
      tags:
        - Doencas
      summary: Remover doença
      operationId: deletarDoenca
      responses:
        '204':
          description: Removido

  /api/v1/doencas/por-especie/{especieId}:
    get:
      tags:
        - Doencas
      summary: Listar doenças de uma espécie específica
      operationId: listarDoencasPorEspecie
      parameters:
        - name: especieId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista filtrada
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yml#/ApiResponseListaDoenca'
