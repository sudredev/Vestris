# Rota: /api/v1/medicamentos
medicamentos_colecao:
  post:
    tags:
      - Medicamentos
    summary: Cadastrar medicamento
    operationId: criarMedicamento
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/MedicamentoRequest'
    responses:
      '200':
        description: Sucesso
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ApiResponseMedicamento'
  get:
    tags:
      - Medicamentos
    summary: Listar medicamentos
    operationId: listarMedicamentos
    responses:
      '200':
        description: Lista
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ApiResponseListaMedicamento'

# Rota: /api/v1/medicamentos/{id}
medicamentos_item:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  get:
    tags:
      - Medicamentos
    summary: Buscar por ID
    operationId: buscarMedicamentoPorId
    responses:
      '200':
        description: Encontrado
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ApiResponseMedicamento'
  put:
    tags:
      - Medicamentos
    summary: Atualizar
    operationId: atualizarMedicamento
    requestBody:
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/MedicamentoRequest'
    responses:
      '200':
        description: Atualizado
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ApiResponseMedicamento'
  delete:
    tags:
      - Medicamentos
    summary: Remover
    operationId: deletarMedicamento
    responses:
      '204':
        description: Removido

# Rota para buscar vias disponíveis
vias_por_medicamento:
  get:
    tags: [Medicamentos]
    summary: Listar vias de administração disponíveis
    description: "Retorna as vias cadastradas nas referências para este medicamento e espécie."
    operationId: listarViasDoMedicamento
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: especieId
        in: query
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Lista de vias (Strings)
        content:
          application/json:
            schema:
              type: array
              items: { type: string }