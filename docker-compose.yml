version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: vestris-db
    environment:
      POSTGRES_DB: vestris_db
      POSTGRES_USER: vestris_user
      POSTGRES_PASSWORD: vestris_password
    ports:
      - "5432:5432"
    volumes:
      - ./infra/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql